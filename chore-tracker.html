<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chore Champions 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --charlie: #FF6B6B;
    --charlie-light: #FFE5E5;
    --bertie: #4ECDC4;
    --bertie-light: #E0FAF8;
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --text: #2D3748;
    --muted: #A0AEC0;
    --gold: #FFD700;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 30px;
  }

  header {
    background: linear-gradient(135deg, var(--charlie) 0%, #FF8E53 50%, var(--bertie) 100%);
    padding: 24px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px; right: -30px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: white;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.85rem;
    font-weight: 600;
    margin-top: 4px;
    position: relative;
  }

  /* Score cards */
  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }

  .score-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border-top: 5px solid;
    transition: transform 0.2s;
  }
  .score-card.charlie { border-color: var(--charlie); }
  .score-card.bertie  { border-color: var(--bertie); }

  .score-card .kid-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .score-card.charlie .kid-name { color: var(--charlie); }
  .score-card.bertie  .kid-name { color: var(--bertie); }

  .score-num {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    line-height: 1;
  }
  .score-card.charlie .score-num { color: var(--charlie); }
  .score-card.bertie  .score-num { color: var(--bertie); }

  .score-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Kid selector */
  .kid-selector {
    display: flex;
    gap: 10px;
    padding: 0 16px 12px;
  }

  .kid-btn {
    flex: 1;
    padding: 12px;
    border: 3px solid transparent;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card);
    color: var(--muted);
  }
  .kid-btn.charlie { border-color: var(--charlie); }
  .kid-btn.bertie  { border-color: var(--bertie); }
  .kid-btn.charlie.active {
    background: var(--charlie);
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    transform: scale(1.02);
  }
  .kid-btn.bertie.active {
    background: var(--bertie);
    color: white;
    box-shadow: 0 4px 15px rgba(78,205,196,0.4);
    transform: scale(1.02);
  }

  /* Section heading */
  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--muted);
    padding: 0 20px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Chore list */
  .chores-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chore-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .chore-item:active { transform: scale(0.98); }

  .chore-item.done-charlie {
    background: var(--charlie-light);
    border-color: var(--charlie);
  }
  .chore-item.done-bertie {
    background: var(--bertie-light);
    border-color: var(--bertie);
  }

  .chore-emoji {
    font-size: 1.8rem;
    flex-shrink: 0;
    width: 42px;
    text-align: center;
  }

  .chore-info { flex: 1; }

  .chore-name {
    font-weight: 800;
    font-size: 0.95rem;
  }

  .chore-done-by {
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .chore-done-by.charlie { color: var(--charlie); }
  .chore-done-by.bertie  { color: var(--bertie); }

  .chore-check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .done-charlie .chore-check {
    background: var(--charlie);
    border-color: var(--charlie);
    color: white;
  }
  .done-bertie .chore-check {
    background: var(--bertie);
    border-color: var(--bertie);
    color: white;
  }

  /* Status banner */
  .status-banner {
    margin: 0 16px 12px;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .status-banner.show { display: block; }
  .status-banner.success { background: #D4EDDA; color: #155724; }
  .status-banner.error   { background: #F8D7DA; color: #721C24; }
  .status-banner.info    { background: #D1ECF1; color: #0C5460; }

  /* View toggle */
  .view-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 16px 12px;
  }
  .view-tab {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.82rem;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }
  .view-tab.active {
    background: var(--text);
    color: white;
  }

  /* Summary view */
  .summary-view { padding: 0 16px; display: none; }
  .summary-view.show { display: block; }
  .chores-view { display: block; }
  .chores-view.hide { display: none; }

  .summary-kid {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .summary-kid-header {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-kid.charlie .summary-kid-header { color: var(--charlie); }
  .summary-kid.bertie  .summary-kid-header { color: var(--bertie); }

  .summary-chore-tag {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    margin: 3px 3px 3px 0;
  }
  .charlie .summary-chore-tag { background: var(--charlie-light); color: var(--charlie); }
  .bertie  .summary-chore-tag { background: var(--bertie-light);  color: var(--bertie); }

  .no-chores {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Config panel */
  .config-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--text);
    color: white;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
  }

  .config-panel {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    width: 280px;
    z-index: 100;
  }
  .config-panel.show { display: block; }
  .config-panel h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    margin-bottom: 12px;
  }
  .config-panel input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #E2E8F0;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .config-panel label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .save-btn {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 4px;
  }
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: #FEE2E2;
    color: #DC2626;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 6px;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--text);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #E2E8F0;
    border-top-color: var(--charlie);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confetti-burst {
    position: fixed;
    pointer-events: none;
    z-index: 300;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div style="text-align:center">
    <div class="spinner" style="margin: 0 auto 12px"></div>
    Loading chores...
  </div>
</div>

<header>
  <h1>🏆 Chore Champions</h1>
  <p class="subtitle">Who's going to win today?</p>
</header>

<!-- Scores -->
<div class="scores">
  <div class="score-card charlie">
    <div class="kid-name">Charlie</div>
    <div class="score-num" id="charlieScore">0</div>
    <div class="score-label">chores done</div>
  </div>
  <div class="score-card bertie">
    <div class="kid-name">Bertie</div>
    <div class="score-num" id="bertieScore">0</div>
    <div class="score-label">chores done</div>
  </div>
</div>

<!-- View tabs -->
<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('chores')">📋 Chores</button>
  <button class="view-tab" onclick="switchView('summary')">📊 Summary</button>
</div>

<!-- Status banner -->
<div class="status-banner" id="statusBanner"></div>

<!-- Kid selector -->
<div class="kid-selector chores-view" id="kidSelector">
  <button class="kid-btn charlie active" onclick="selectKid('Charlie')">👦 Charlie</button>
  <button class="kid-btn bertie" onclick="selectKid('Bertie')">🧒 Bertie</button>
</div>

<div class="section-label chores-view" id="sectionLabel">Tap a chore to mark it done as Charlie</div>

<!-- Chores list -->
<div class="chores-list chores-view" id="choresList"></div>

<!-- Summary view -->
<div class="summary-view" id="summaryView">
  <div class="summary-kid charlie">
    <div class="summary-kid-header">🔴 Charlie's chores</div>
    <div id="charlieSummary"><span class="no-chores">No chores done yet</span></div>
  </div>
  <div class="summary-kid bertie">
    <div class="summary-kid-header">🟢 Bertie's chores</div>
    <div id="bertieSummary"><span class="no-chores">No chores done yet</span></div>
  </div>
</div>

<!-- Config button -->
<button class="config-btn" onclick="toggleConfig()" title="Settings">⚙️</button>

<!-- Config panel -->
<div class="config-panel" id="configPanel">
  <h3>⚙️ Settings</h3>
  <label>Google Apps Script URL</label>
  <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/..." />
  <button class="save-btn" onclick="saveConfig()">Save URL</button>
  <button class="save-btn" style="background:#3182CE;margin-top:6px" onclick="testConnection()">🔌 Test Connection</button>
  <button class="reset-btn" onclick="resetDay()">🔄 Reset Today's Chores</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'choreChampions_scriptUrl';
let SCRIPT_URL = localStorage.getItem(STORAGE_KEY) || '';

// Default chores (emoji + name)
const DEFAULT_CHORES = [
  { id: 'dishes',    emoji: '🍽️',  name: 'Wash the dishes' },
  { id: 'hoover',    emoji: '🧹',  name: 'Hoover the floor' },
  { id: 'bins',      emoji: '🗑️',  name: 'Empty the bins' },
  { id: 'laundry',   emoji: '👕',  name: 'Put laundry away' },
  { id: 'table',     emoji: '🍴',  name: 'Set the table' },
  { id: 'pets',      emoji: '🐾',  name: 'Feed the pets' },
  { id: 'tidy',      emoji: '🧸',  name: 'Tidy your bedroom' },
  { id: 'shopping',  emoji: '🛍️',  name: 'Help with shopping' },
  { id: 'recycling', emoji: '♻️',  name: 'Sort the recycling' },
  { id: 'wipe',      emoji: '🧽',  name: 'Wipe the surfaces' },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let selectedKid = 'Charlie';
let chores = []; // will be loaded from sheet or defaults
let currentView = 'chores';

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scriptUrlInput').value = SCRIPT_URL;
  loadChores();
});

async function loadChores() {
  showLoading(true);
  if (!SCRIPT_URL) {
    // No URL set - use defaults with no completion data
    chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: null }));
    showLoading(false);
    renderAll();
    showBanner('⚙️ Set your Google Apps Script URL in settings to save progress!', 'info');
    return;
  }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getChores`);
    const data = await res.json();
    if (data.chores) {
      chores = data.chores;
    } else {
      chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: null }));
    }
  } catch(e) {
    chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: null }));
    showBanner('⚠️ Could not reach Google Sheet. Working offline.', 'error');
  }
  showLoading(false);
  renderAll();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderChores();
  renderScores();
  renderSummary();
  updateSectionLabel();
}

function renderChores() {
  const list = document.getElementById('choresList');
  list.innerHTML = '';
  chores.forEach(chore => {
    const div = document.createElement('div');
    div.className = 'chore-item' + (chore.doneBy ? ` done-${chore.doneBy.toLowerCase()}` : '');
    div.onclick = () => toggleChore(chore.id);
    div.innerHTML = `
      <div class="chore-emoji">${chore.emoji}</div>
      <div class="chore-info">
        <div class="chore-name">${chore.name}</div>
        ${chore.doneBy ? `<div class="chore-done-by ${chore.doneBy.toLowerCase()}">✓ Done by ${chore.doneBy}</div>` : ''}
      </div>
      <div class="chore-check">${chore.doneBy ? '✓' : ''}</div>
    `;
    list.appendChild(div);
  });
}

function renderScores() {
  const cs = chores.filter(c => c.doneBy === 'Charlie').length;
  const bs = chores.filter(c => c.doneBy === 'Bertie').length;
  document.getElementById('charlieScore').textContent = cs;
  document.getElementById('bertieScore').textContent = bs;
}

function renderSummary() {
  const charlieChores = chores.filter(c => c.doneBy === 'Charlie');
  const bertieChores  = chores.filter(c => c.doneBy === 'Bertie');

  const cEl = document.getElementById('charlieSummary');
  const bEl = document.getElementById('bertieSummary');

  cEl.innerHTML = charlieChores.length
    ? charlieChores.map(c => `<span class="summary-chore-tag">${c.emoji} ${c.name}</span>`).join('')
    : '<span class="no-chores">No chores done yet</span>';

  bEl.innerHTML = bertieChores.length
    ? bertieChores.map(c => `<span class="summary-chore-tag">${c.emoji} ${c.name}</span>`).join('')
    : '<span class="no-chores">No chores done yet</span>';
}

function updateSectionLabel() {
  document.getElementById('sectionLabel').textContent =
    `Tap a chore to mark it done as ${selectedKid}`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function selectKid(name) {
  selectedKid = name;
  document.querySelectorAll('.kid-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.kid-btn.${name.toLowerCase()}`).classList.add('active');
  updateSectionLabel();
}

async function toggleChore(id) {
  const chore = chores.find(c => c.id === id);
  if (!chore) return;

  if (chore.doneBy === selectedKid) {
    // Undo
    chore.doneBy = null;
  } else if (chore.doneBy && chore.doneBy !== selectedKid) {
    showBanner(`⚠️ Already done by ${chore.doneBy}! Tap their name first to undo.`, 'error');
    return;
  } else {
    chore.doneBy = selectedKid;
    burst(event);
  }

  renderAll();
  await saveChore(chore);
}

async function saveChore(chore) {
  if (!SCRIPT_URL) return;
  try {
    const params = new URLSearchParams({
      action: 'updateChore',
      id: chore.id,
      doneBy: chore.doneBy || ''
    });
    const res = await fetch(`${SCRIPT_URL}?${params}`);
    const data = await res.json();
    if (data.error) showBanner('⚠️ Sheet error: ' + data.error, 'error');
  } catch(e) {
    showBanner('⚠️ Could not sync to sheet: ' + e.message, 'error');
  }
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && view === 'chores') || (i === 1 && view === 'summary'));
  });
  document.querySelectorAll('.chores-view').forEach(el => el.classList.toggle('hide', view !== 'chores'));
  const sv = document.getElementById('summaryView');
  sv.classList.toggle('show', view === 'summary');
  if (view === 'summary') renderSummary();
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('show');
}

function saveConfig() {
  SCRIPT_URL = document.getElementById('scriptUrlInput').value.trim();
  localStorage.setItem(STORAGE_KEY, SCRIPT_URL);
  document.getElementById('configPanel').classList.remove('show');
  showBanner('✅ URL saved! Reloading chores...', 'success');
  setTimeout(loadChores, 800);
}

async function resetDay() {
  if (!confirm('Reset all chores for today? This will clear everyone\'s progress.')) return;
  chores.forEach(c => c.doneBy = null);
  renderAll();
  document.getElementById('configPanel').classList.remove('show');
  if (SCRIPT_URL) {
    try {
      await fetch(`${SCRIPT_URL}?action=resetDay`);
    } catch(e) {}
  }
  showBanner('🔄 Chores reset!', 'success');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
async function testConnection() {
  if (!SCRIPT_URL) { showBanner('⚠️ No URL saved yet', 'error'); return; }
  showBanner('🔌 Testing connection...', 'info');
  document.getElementById('configPanel').classList.remove('show');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getChores`);
    const data = await res.json();
    if (data.chores) {
      showBanner(`✅ Connected! Found ${data.chores.length} chores for ${data.date}`, 'success');
    } else {
      showBanner('⚠️ Unexpected response: ' + JSON.stringify(data).slice(0,80), 'error');
    }
  } catch(e) {
    showBanner('❌ Failed: ' + e.message, 'error');
  }
}

function showLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

let bannerTimer;
function showBanner(msg, type) {
  const b = document.getElementById('statusBanner');
  b.textContent = msg;
  b.className = `status-banner show ${type}`;
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => b.classList.remove('show'), 3500);
}

function burst(e) {
  const colors = ['#FF6B6B', '#4ECDC4', '#FFD700', '#A29BFE', '#FD79A8'];
  const x = e?.clientX || window.innerWidth / 2;
  const y = e?.clientY || window.innerHeight / 2;
  for (let i = 0; i < 12; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:fixed; z-index:300; pointer-events:none;
      width:10px; height:10px; border-radius:50%;
      background:${colors[i % colors.length]};
      left:${x}px; top:${y}px;
      animation: fly${i} 0.7s ease-out forwards;
    `;
    const angle = (i / 12) * 360;
    const dist = 60 + Math.random() * 60;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const dy = Math.sin(angle * Math.PI/180) * dist;
    const style = document.createElement('style');
    style.textContent = `@keyframes fly${i} {
      0%   { transform: translate(0,0) scale(1); opacity:1; }
      100% { transform: translate(${dx}px,${dy}px) scale(0); opacity:0; }
    }`;
    document.head.appendChild(style);
    document.body.appendChild(dot);
    setTimeout(() => { dot.remove(); style.remove(); }, 700);
  }
}
</script>
</body>
</html>
