<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chore Champions 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --charlie: #FF6B6B;
    --charlie-light: #FFE5E5;
    --bertie: #4ECDC4;
    --bertie-light: #E0FAF8;
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --text: #2D3748;
    --muted: #A0AEC0;
    --gold: #FFD700;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 30px;
  }

  header {
    background: linear-gradient(135deg, var(--charlie) 0%, #FF8E53 50%, var(--bertie) 100%);
    padding: 24px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -30px; left: -30px; right: -30px;
    height: 80px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: white;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: relative;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 0.85rem;
    font-weight: 600;
    margin-top: 4px;
    position: relative;
  }

  /* Score cards */
  .scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }

  .score-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border-top: 5px solid;
    transition: transform 0.2s;
  }
  .score-card.charlie { border-color: var(--charlie); }
  .score-card.bertie  { border-color: var(--bertie); }

  .score-card .kid-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .score-card.charlie .kid-name { color: var(--charlie); }
  .score-card.bertie  .kid-name { color: var(--bertie); }

  .score-num {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    line-height: 1;
  }
  .score-card.charlie .score-num { color: var(--charlie); }
  .score-card.bertie  .score-num { color: var(--bertie); }

  .score-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Kid selector */
  .kid-selector {
    display: flex;
    gap: 10px;
    padding: 0 16px 12px;
  }

  .kid-btn {
    flex: 1;
    padding: 12px;
    border: 3px solid transparent;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card);
    color: var(--muted);
  }
  .kid-btn.charlie { border-color: var(--charlie); }
  .kid-btn.bertie  { border-color: var(--bertie); }
  .kid-btn.charlie.active {
    background: var(--charlie);
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    transform: scale(1.02);
  }
  .kid-btn.bertie.active {
    background: var(--bertie);
    color: white;
    box-shadow: 0 4px 15px rgba(78,205,196,0.4);
    transform: scale(1.02);
  }

  /* Section heading */
  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--muted);
    padding: 0 20px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Chore list */
  .chores-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chore-item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .chore-item:active { transform: scale(0.98); }

  .chore-item.done-charlie {
    background: var(--charlie-light);
    border-color: var(--charlie);
  }
  .chore-item.done-bertie {
    background: var(--bertie-light);
    border-color: var(--bertie);
  }

  .chore-emoji {
    font-size: 1.8rem;
    flex-shrink: 0;
    width: 42px;
    text-align: center;
  }

  .chore-info { flex: 1; }

  .chore-name {
    font-weight: 800;
    font-size: 0.95rem;
  }

  .chore-done-by {
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .chore-done-by.charlie { color: var(--charlie); }
  .chore-done-by.bertie  { color: var(--bertie); }

  .chore-check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .chore-check.checked-charlie {
    background: var(--charlie);
    border-color: var(--charlie);
    color: white;
  }
  .chore-check.checked-bertie {
    background: var(--bertie);
    border-color: var(--bertie);
    color: white;
  }
  .chore-item.done-both {
    background: linear-gradient(135deg, var(--charlie-light) 50%, var(--bertie-light) 50%);
    border-color: var(--gold);
  }

  /* Status banner */
  .status-banner {
    margin: 0 16px 12px;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 700;
    text-align: center;
    display: none;
  }
  .status-banner.show { display: block; }
  .status-banner.success { background: #D4EDDA; color: #155724; }
  .status-banner.error   { background: #F8D7DA; color: #721C24; }
  .status-banner.info    { background: #D1ECF1; color: #0C5460; }

  /* View toggle */
  .view-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 16px 12px;
  }
  .view-tab {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.82rem;
    cursor: pointer;
    background: var(--card);
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }
  .view-tab.active {
    background: var(--text);
    color: white;
  }

  /* Summary view */
  .summary-view { padding: 0 16px; display: none; }
  .summary-view.show { display: block; }
  .chores-view { display: block; }
  .chores-view.hide { display: none; }

  .summary-kid {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .summary-kid-header {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-kid.charlie .summary-kid-header { color: var(--charlie); }
  .summary-kid.bertie  .summary-kid-header { color: var(--bertie); }

  .summary-chore-tag {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    margin: 3px 3px 3px 0;
  }
  .charlie .summary-chore-tag { background: var(--charlie-light); color: var(--charlie); }
  .bertie  .summary-chore-tag { background: var(--bertie-light);  color: var(--bertie); }

  .no-chores {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Config panel */
  .config-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--text);
    color: white;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
  }

  .config-panel {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    width: 280px;
    z-index: 100;
  }
  .config-panel.show { display: block; }
  .config-panel h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    margin-bottom: 12px;
  }
  .config-panel input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #E2E8F0;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .config-panel label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }
  .save-btn {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 4px;
  }
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: #FEE2E2;
    color: #DC2626;
    border: none;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 6px;
  }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--text);
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #E2E8F0;
    border-top-color: var(--charlie);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confetti-burst {
    position: fixed;
    pointer-events: none;
    z-index: 300;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div style="text-align:center">
    <div class="spinner" style="margin: 0 auto 12px"></div>
    Loading chores...
  </div>
</div>

<header>
  <h1>🏆 Chore Champions</h1>
  <p class="subtitle">Who's going to win today?</p>
</header>

<!-- Scores -->
<div class="scores">
  <div class="score-card charlie">
    <div class="kid-name">Charlie</div>
    <div class="score-num" id="charlieScore">0</div>
    <div class="score-label">this week</div>
  </div>
  <div class="score-card bertie">
    <div class="kid-name">Bertie</div>
    <div class="score-num" id="bertieScore">0</div>
    <div class="score-label">this week</div>
  </div>
</div>

<!-- View tabs -->
<div class="view-tabs">
  <button class="view-tab active" data-view="chores" onclick="switchView('chores')">📋 Chores</button>
  <button class="view-tab" data-view="summary" onclick="switchView('summary')">📊 Summary</button>
</div>

<!-- Status banner -->
<div class="status-banner" id="statusBanner"></div>

<!-- Kid selector -->
<div class="kid-selector chores-view" id="kidSelector">
  <button class="kid-btn charlie active" onclick="selectKid('Charlie')">👦 Charlie</button>
  <button class="kid-btn bertie" onclick="selectKid('Bertie')">🧒 Bertie</button>
</div>

<div class="section-label chores-view" id="sectionLabel">Tap a chore to mark it done as Charlie</div>

<!-- Chores list -->
<div class="chores-list chores-view" id="choresList"></div>

<!-- Summary view -->
<div class="summary-view" id="summaryView">
  <div class="summary-kid charlie">
    <div class="summary-kid-header">🔴 Charlie's chores</div>
    <div id="charlieSummary"><span class="no-chores">No chores done yet</span></div>
  </div>
  <div class="summary-kid bertie">
    <div class="summary-kid-header">🟢 Bertie's chores</div>
    <div id="bertieSummary"><span class="no-chores">No chores done yet</span></div>
  </div>
</div>

<!-- Config button -->
<button class="config-btn" id="configBtn" onclick="toggleConfig()" title="Settings">⚙️</button>

<!-- Config panel -->
<div class="config-panel" id="configPanel">
  <h3>⚙️ Settings</h3>
  <label>Google Apps Script URL</label>
  <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/..." />
  <button class="save-btn" onclick="saveConfig()">Save URL</button>
  <button class="save-btn" style="background:#3182CE;margin-top:6px" onclick="testConnection()">🔌 Test Connection</button>
  <button class="reset-btn" onclick="resetDay()">🔄 Reset Today's Chores</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'choreChampions_scriptUrl';
let SCRIPT_URL = localStorage.getItem(STORAGE_KEY) || '';

// Default chores (emoji + name)
const DEFAULT_CHORES = [
  { id: 'dishes',    emoji: '🍽️',  name: 'Wash the dishes' },
  { id: 'hoover',    emoji: '🧹',  name: 'Hoover the floor' },
  { id: 'bins',      emoji: '🗑️',  name: 'Empty the bins' },
  { id: 'laundry',   emoji: '👕',  name: 'Put the washing on' },
  { id: 'table',     emoji: '🍴',  name: 'Hang the washing out' },
  { id: 'pets',      emoji: '🐾',  name: 'Walk the dog' },
  { id: 'tidy',      emoji: '🧸',  name: 'Tidy your bedroom' },
  { id: 'shopping',  emoji: '🛍️',  name: 'Help with shopping' },
  { id: 'recycling', emoji: '♻️',  name: 'Sort the recycling' },
  { id: 'wipe',      emoji: '🧽',  name: 'Mow the lawn' },
];

// ─── WEEKLY SCORES ────────────────────────────────────────────────────────────
const WEEKLY_KEY = 'choreChampions_weeklyScores';

function getWeekKey() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day; // offset to Monday
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  return monday.toISOString().slice(0, 10); // YYYY-MM-DD
}

function getWeeklyScores() {
  const week = getWeekKey();
  try {
    const stored = JSON.parse(localStorage.getItem(WEEKLY_KEY) || 'null');
    if (stored && stored.week === week) return stored;
  } catch(e) {}
  return { week, Charlie: 0, Bertie: 0 };
}

function saveWeeklyScores(scores) {
  localStorage.setItem(WEEKLY_KEY, JSON.stringify(scores));
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let selectedKid = 'Charlie';
let chores = []; // will be loaded from sheet or defaults
let currentView = 'chores';
const syncingChores = new Set();

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scriptUrlInput').value = SCRIPT_URL;
  loadChores();
  document.addEventListener('click', e => {
    const panel = document.getElementById('configPanel');
    if (panel.classList.contains('show') &&
        !panel.contains(e.target) &&
        e.target !== document.getElementById('configBtn')) {
      panel.classList.remove('show');
    }
  });
});

async function loadChores() {
  showLoading(true);
  if (!SCRIPT_URL) {
    // No URL set - use defaults with no completion data
    chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: [] }));
    showLoading(false);
    renderAll();
    showBanner('⚙️ Set your Google Apps Script URL in settings to save progress!', 'info');
    return;
  }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getChores`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.chores) {
      chores = data.chores.map(c => ({
        ...c,
        doneBy: Array.isArray(c.doneBy) ? c.doneBy
              : c.doneBy ? c.doneBy.split(',').filter(Boolean)
              : []
      }));
      if (data.scores) {
        const s = getWeeklyScores();
        s.Charlie = data.scores.Charlie || 0;
        s.Bertie  = data.scores.Bertie  || 0;
        saveWeeklyScores(s);
      }
    } else {
      chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: [] }));
    }
  } catch(e) {
    chores = DEFAULT_CHORES.map(c => ({ ...c, doneBy: [] }));
    showBanner('⚠️ Could not reach Google Sheet. Working offline.', 'error');
  }
  showLoading(false);
  renderAll();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderChores();
  renderScores();
  renderSummary();
  updateSectionLabel();
}

function renderChores() {
  const list = document.getElementById('choresList');
  list.innerHTML = '';
  chores.forEach(chore => {
    const div = document.createElement('div');
    const doneByCharlie = chore.doneBy.includes('Charlie');
    const doneByBertie  = chore.doneBy.includes('Bertie');
    const doneBoth      = doneByCharlie && doneByBertie;
    let itemClass = 'chore-item';
    if (doneBoth)          itemClass += ' done-both';
    else if (doneByCharlie) itemClass += ' done-charlie';
    else if (doneByBertie)  itemClass += ' done-bertie';
    div.className = itemClass;
    div.onclick = (e) => toggleChore(chore.id, e);

    const emojiDiv = document.createElement('div');
    emojiDiv.className = 'chore-emoji';
    emojiDiv.textContent = chore.emoji;

    const infoDiv = document.createElement('div');
    infoDiv.className = 'chore-info';

    const nameDiv = document.createElement('div');
    nameDiv.className = 'chore-name';
    nameDiv.textContent = chore.name;
    infoDiv.appendChild(nameDiv);

    if (chore.doneBy.length) {
      const doneByDiv = document.createElement('div');
      doneByDiv.className = doneBoth ? 'chore-done-by' : `chore-done-by ${chore.doneBy[0].toLowerCase()}`;
      doneByDiv.textContent = `✓ Done by ${chore.doneBy.join(' & ')}`;
      infoDiv.appendChild(doneByDiv);
    }

    const selectedDone = chore.doneBy.includes(selectedKid);
    const checkDiv = document.createElement('div');
    checkDiv.className = 'chore-check' + (selectedDone ? ` checked-${selectedKid.toLowerCase()}` : '');
    checkDiv.textContent = selectedDone ? '✓' : '';

    div.appendChild(emojiDiv);
    div.appendChild(infoDiv);
    div.appendChild(checkDiv);
    list.appendChild(div);
  });
}

function renderScores() {
  const scores = getWeeklyScores();
  document.getElementById('charlieScore').textContent = scores.Charlie || 0;
  document.getElementById('bertieScore').textContent = scores.Bertie || 0;
}

function renderSummary() {
  const charlieChores = chores.filter(c => c.doneBy.includes('Charlie'));
  const bertieChores  = chores.filter(c => c.doneBy.includes('Bertie'));

  const cEl = document.getElementById('charlieSummary');
  const bEl = document.getElementById('bertieSummary');

  cEl.innerHTML = '';
  if (charlieChores.length) {
    charlieChores.forEach(c => {
      const tag = document.createElement('span');
      tag.className = 'summary-chore-tag';
      tag.textContent = `${c.emoji} ${c.name}`;
      cEl.appendChild(tag);
    });
  } else {
    const span = document.createElement('span');
    span.className = 'no-chores';
    span.textContent = 'No chores done yet';
    cEl.appendChild(span);
  }

  bEl.innerHTML = '';
  if (bertieChores.length) {
    bertieChores.forEach(c => {
      const tag = document.createElement('span');
      tag.className = 'summary-chore-tag';
      tag.textContent = `${c.emoji} ${c.name}`;
      bEl.appendChild(tag);
    });
  } else {
    const span = document.createElement('span');
    span.className = 'no-chores';
    span.textContent = 'No chores done yet';
    bEl.appendChild(span);
  }
}

function updateSectionLabel() {
  document.getElementById('sectionLabel').textContent =
    `Tap a chore to mark it done as ${selectedKid}`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function selectKid(name) {
  selectedKid = name;
  document.querySelectorAll('.kid-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.kid-btn.${name.toLowerCase()}`).classList.add('active');
  updateSectionLabel();
  renderChores(); // re-render so check circles reflect the newly selected kid
}

async function toggleChore(id, event) {
  if (syncingChores.has(id)) return;
  const chore = chores.find(c => c.id === id);
  if (!chore) return;

  const alreadyDone = chore.doneBy.includes(selectedKid);
  const delta = alreadyDone ? -1 : 1;
  const scores = getWeeklyScores();
  if (alreadyDone) {
    chore.doneBy = chore.doneBy.filter(k => k !== selectedKid);
    scores[selectedKid] = Math.max(0, (scores[selectedKid] || 0) - 1);
  } else {
    chore.doneBy = [...chore.doneBy, selectedKid];
    scores[selectedKid] = (scores[selectedKid] || 0) + 1;
    burst(event);
  }
  saveWeeklyScores(scores);

  renderAll();
  syncingChores.add(id);
  await Promise.all([saveChore(chore), saveScore(selectedKid, delta)]);
  syncingChores.delete(id);
}

async function saveScore(kid, delta) {
  if (!SCRIPT_URL) return;
  try {
    const params = new URLSearchParams({ action: 'updateScore', kid, delta });
    const res = await fetch(`${SCRIPT_URL}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    console.warn('Score sync failed:', e.message);
  }
}

async function saveChore(chore) {
  if (!SCRIPT_URL) return;
  try {
    const params = new URLSearchParams({
      action: 'updateChore',
      id: chore.id,
      doneBy: chore.doneBy.join(',')
    });
    const res = await fetch(`${SCRIPT_URL}?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) showBanner('⚠️ Sheet error: ' + data.error, 'error');
  } catch(e) {
    showBanner('⚠️ Could not sync to sheet: ' + e.message, 'error');
  }
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  document.querySelectorAll('.chores-view').forEach(el => el.classList.toggle('hide', view !== 'chores'));
  const sv = document.getElementById('summaryView');
  sv.classList.toggle('show', view === 'summary');
  if (view === 'summary') renderSummary();
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('show');
}

function saveConfig() {
  const url = document.getElementById('scriptUrlInput').value.trim();
  if (url && !url.startsWith('https://script.google.com/')) {
    showBanner('⚠️ URL must start with https://script.google.com/', 'error');
    return;
  }
  SCRIPT_URL = url;
  localStorage.setItem(STORAGE_KEY, SCRIPT_URL);
  document.getElementById('configPanel').classList.remove('show');
  showBanner('✅ URL saved! Reloading chores...', 'success');
  setTimeout(loadChores, 800);
}

async function resetDay() {
  if (!confirm('Reset all chores for today? This will clear everyone\'s progress.')) return;
  chores.forEach(c => c.doneBy = []);
  renderAll();
  document.getElementById('configPanel').classList.remove('show');
  if (SCRIPT_URL) {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=resetDay`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    } catch(e) {
      showBanner('⚠️ Local chores cleared but sheet reset failed: ' + e.message, 'error');
      return;
    }
  }
  showBanner('🔄 Chores reset!', 'success');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
async function testConnection() {
  if (!SCRIPT_URL) { showBanner('⚠️ No URL saved yet', 'error'); return; }
  showBanner('🔌 Testing connection...', 'info');
  document.getElementById('configPanel').classList.remove('show');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getChores`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.chores) {
      showBanner(`✅ Connected! Found ${data.chores.length} chores${data.date ? ` for ${data.date}` : ''}`, 'success');
    } else {
      showBanner('⚠️ Unexpected response: ' + JSON.stringify(data).slice(0,80), 'error');
    }
  } catch(e) {
    showBanner('❌ Failed: ' + e.message, 'error');
  }
}

function showLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('show', on);
}

let bannerTimer;
function showBanner(msg, type) {
  const b = document.getElementById('statusBanner');
  b.textContent = msg;
  b.className = `status-banner show ${type}`;
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => b.classList.remove('show'), 3500);
}

function burst(e) {
  const colors = ['#FF6B6B', '#4ECDC4', '#FFD700', '#A29BFE', '#FD79A8'];
  const x = e?.clientX || window.innerWidth / 2;
  const y = e?.clientY || window.innerHeight / 2;
  for (let i = 0; i < 12; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:fixed; z-index:300; pointer-events:none;
      width:10px; height:10px; border-radius:50%;
      background:${colors[i % colors.length]};
      left:${x}px; top:${y}px;
    `;
    const angle = (i / 12) * 360;
    const dist = 60 + Math.random() * 60;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const dy = Math.sin(angle * Math.PI/180) * dist;
    document.body.appendChild(dot);
    dot.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) scale(0)`, opacity: 0 }
    ], { duration: 700, easing: 'ease-out', fill: 'forwards' });
    setTimeout(() => dot.remove(), 700);
  }
}
</script>
